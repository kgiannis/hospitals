name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        # The app fetches ./data/*.json same-origin, so bundle the published
        # schedules into the web/ directory that becomes the site root.
        run: |
          mkdir -p web/data
          cp daily_schedules/attica/*.json web/data/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deploy
        uses: actions/deploy-pages@v4
